{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wayne Healthcare | Wayne Enterprises</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            background:#05070b;
            color:#d6d9df;
            line-height:1.6;
            overflow-x:hidden;

            background-image:
                linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);

            background-size:80px 80px;
        }

        a{
            text-decoration:none;
        }

        .container{
            width:90%;
            max-width:1300px;
            margin:auto;
        }

        /* HEADER */

        header{
            position:sticky;
            top:0;
            z-index:1000;

            background:rgba(4,7,12,0.95);

            border-bottom:1px solid rgba(212,175,55,0.15);

            backdrop-filter:blur(8px);
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:22px 0;
        }

        .logo{
            font-size:30px;
            font-weight:900;
            color:#d4af37;
            letter-spacing:4px;
        }

        .nav-links{
            display:flex;
            gap:35px;
        }

        .nav-links a{
            color:#94a3b8;
            font-size:13px;
            letter-spacing:2px;
            text-transform:uppercase;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#d4af37;
        }

        /* HERO */

        .healthcare-hero{
            min-height:100vh;
            display:flex;
            align-items:center;
            text-align:center;
        }

        .division-badge{
            display:inline-block;

            padding:10px 20px;

            border:1px solid rgba(212,175,55,0.3);

            color:#d4af37;

            background:rgba(212,175,55,0.05);

            margin-bottom:30px;

            letter-spacing:3px;

            text-transform:uppercase;

            font-size:12px;
        }

        .hero-content h1{
            font-size:120px;
            font-weight:900;
            color:#e5e7eb;
            line-height:1;
            text-transform:uppercase;
            letter-spacing:5px;
            margin-bottom:20px;
        }

        .hero-slogan{
            font-size:30px;
            color:#d4af37;
            margin-bottom:25px;
        }

        .hero-description{
            max-width:850px;
            margin:auto;
            font-size:20px;
            color:#94a3b8;
        }

        /* BUTTONS */

        .hero-buttons,
        .contact-buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:45px;
        }

        .btn-primary{
            background:#d4af37;
            color:#05070b;

            padding:15px 30px;

            border-radius:5px;

            text-transform:uppercase;

            font-weight:bold;

            letter-spacing:1px;

            transition:0.3s;
        }

        .btn-primary:hover{
            background:#f1cb52;
            transform:translateY(-3px);
        }

        .btn-secondary{
            border:1px solid #d4af37;

            color:#d4af37;

            padding:15px 30px;

            border-radius:5px;

            text-transform:uppercase;

            font-weight:bold;

            letter-spacing:1px;

            transition:0.3s;
        }

        .btn-secondary:hover{
            background:#d4af37;
            color:#05070b;
        }

        /* SECTIONS */

        section{
            padding:100px 0;
        }

        .section-title{
            text-align:center;
            margin-bottom:60px;
        }

        .section-title h2{
            font-size:42px;
            color:#d4af37;
            margin-bottom:20px;
            text-transform:uppercase;
            letter-spacing:2px;
        }

        .section-title p{
            max-width:850px;
            margin:auto;
            color:#94a3b8;
        }

        /* GRIDS */

        .hero-stats,
        .about-grid,
        .mission-grid,
        .services-grid,
        .why-grid,
        .stats-grid,
        .tech-grid,
        .team-grid,
        .social-grid{
            display:grid;
            gap:25px;
        }

        .hero-stats{
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            margin-top:70px;
        }

        .about-grid,
        .mission-grid,
        .services-grid,
        .why-grid,
        .stats-grid,
        .team-grid,
        .social-grid{
            grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
        }

        .tech-grid{
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        }

        /* CARDS */

        .stat-card,
        .about-card,
        .mission-card,
        .service-card,
        .why-card,
        .stat-box,
        .tech-card,
        .team-card,
        .social-card,
        .contact-box{

            background:rgba(10,15,25,0.9);

            border:1px solid rgba(212,175,55,0.12);

            padding:35px;

            border-radius:12px;

            transition:0.3s;
        }

        .stat-card:hover,
        .about-card:hover,
        .mission-card:hover,
        .service-card:hover,
        .why-card:hover,
        .stat-box:hover,
        .tech-card:hover,
        .team-card:hover,
        .social-card:hover{

            transform:translateY(-5px);

            border-color:#d4af37;

            box-shadow:0 0 30px rgba(212,175,55,0.15);
        }

        .stat-card h3,
        .stat-box h2{
            font-size:45px;
            color:#d4af37;
            margin-bottom:10px;
        }

        .service-card span{
            display:block;
            margin-top:15px;
            color:#00ff88;
            letter-spacing:1px;
            font-size:13px;
        }

        .tech-card,
        .social-card{
            text-align:center;
            font-weight:bold;
            letter-spacing:1px;
        }

        .contact-box{
            text-align:center;
        }

        .contact-info{
            margin-top:35px;
        }

        .contact-info p{
            color:#94a3b8;
            margin-bottom:10px;
        }

        /* FOOTER */

        footer{
            border-top:1px solid rgba(212,175,55,0.15);

            background:#05070b;

            text-align:center;

            padding:30px;

            color:#6b7280;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .hero-content h1{
                font-size:60px;
            }

            .hero-slogan{
                font-size:22px;
            }

            .hero-description{
                font-size:18px;
            }

            .section-title h2{
                font-size:32px;
            }

            nav{
                flex-direction:column;
                gap:20px;
            }

            .nav-links{
                flex-wrap:wrap;
                justify-content:center;
            }
        }

    </style>

</head>
<body>

<header>

    <div class="container">

        <nav>

            <div class="logo">
                WAYNE HEALTHCARE
            </div>

            <div class="nav-links">
                <a href="#services">Servicios</a>
                <a href="#technology">Tecnología</a>
                <a href="#team">Equipo</a>
                <a href="#contact">Contacto</a>
            </div>

        </nav>

    </div>

</header>

{% block content %}
{% endblock %}

<footer>
    <p>© 2026 Wayne Enterprises — Wayne Healthcare Division</p>
</footer>

</body>
</html>
