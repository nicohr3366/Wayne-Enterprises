{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wayne Enterprises{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦇</text></svg>">

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS del portal -->
  <link rel="stylesheet" href="{% static 'core/css/portal.css' %}">

  <!-- Estilos adicionales para autenticación -->
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .auth-box::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(201,168,76,0.4), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }

    .auth-logo h1 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }

    .auth-logo span {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .auth-title {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255,255,255,0.06);
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, rgba(201,168,76,0.9), rgba(180,150,60,0.9));
      color: #050507;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }

    .auth-links {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(201,168,76,0.1);
    }

    .auth-links a {
      color: var(--gold);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .auth-links a:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    .auth-links p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0;
    }

    .messages {
      margin-bottom: 20px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ff6b6b;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      border: 1px solid rgba(40, 167, 69, 0.3);
      color: #51cf66;
    }

    .message.info {
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--gold);
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

<div class="city-bg"></div>
<div class="spotlight"></div>

<div class="auth-container">
  {% block content %}{% endblock %}
</div>

<script>
  // Forzar que todos los enlaces internos se abran en la misma ventana
  document.addEventListener('DOMContentLoaded', function() {
    // Eliminar cualquier atributo target="_blank" existente
    document.querySelectorAll('a[target="_blank"]').forEach(function(link) {
      link.setAttribute('target', '_self');
    });

    // Configurar todos los enlaces internos
    document.querySelectorAll('a[href^="/"], a[href^="."], a[href^="{%"]').forEach(function(link) {
      link.setAttribute('target', '_self');
      link.addEventListener('click', function(e) {
        // Prevenir comportamientos que puedan abrir nueva ventana
        if (e.shiftKey || e.metaKey || e.ctrlKey) {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = this.getAttribute('href');
        }
      });
    });

    // Asegurar que todos los formularios se envíen en la misma ventana
    document.querySelectorAll('form').forEach(function(form) {
      form.setAttribute('target', '_self');
      form.removeAttribute('formtarget');
    });
  });

  // Interceptar submits de formularios para forzar misma ventana
  document.addEventListener('submit', function(e) {
    var form = e.target;
    form.setAttribute('target', '_self');
    form.removeAttribute('formtarget');
  }, true);

  // ============================================
  // SISTEMA DE CIERRE POR INACTIVIDAD
  // ============================================
  // Solo aplicar en páginas autenticadas (dashboard, home, etc.)
  // No aplicar en páginas de login/registro
  (function() {
    // Verificar si estamos en una página que requiere autenticación
    var path = window.location.pathname;
    var isAuthPage = path.includes('/login') || path.includes('/registro') || path.includes('/accounts/logout');

    if (isAuthPage) return; // No aplicar inactividad en páginas de auth

    // Tiempos de inactividad (en milisegundos)
    var TIEMPO_AVISO = 13 * 60 * 1000;      // 13 minutos - mostrar aviso
    var TIEMPO_CIERRE = 15 * 60 * 1000;   // 15 minutos - cerrar sesión
    var INTERVALO_VERIFICACION = 30 * 1000; // Verificar cada 30 segundos

    var ultimaActividad = Date.now();
    var avisoMostrado = false;
    var temporizadorCierre = null;

    // Crear modal de aviso
    function crearModalAviso() {
      var modal = document.createElement('div');
      modal.id = 'inactivity-modal';
      modal.innerHTML = `
        <div style="
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.85);
          backdrop-filter: blur(5px);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Rajdhani', sans-serif;
        ">
          <div style="
            background: linear-gradient(180deg, #1a1a20, #0d0d10);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
          ">
            <div style="
              width: 60px;
              height: 60px;
              margin: 0 auto 20px;
              border: 2px solid #C9A84C;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              color: #C9A84C;
              font-size: 24px;
            ">⚠</div>
            <h3 style="
              color: #f0f0f5;
              font-family: 'Cinzel', serif;
              margin: 0 0 16px 0;
              font-size: 20px;
            ">Sesión por expirar</h3>
            <p style="
              color: #a0a0b0;
              margin: 0 0 24px 0;
              font-size: 15px;
              line-height: 1.6;
            ">
              Tu sesión se cerrará en <strong id="countdown" style="color: #C9A84C;">2 minutos</strong>
              por inactividad.
            </p>
            <button id="stay-logged-in" style="
              background: linear-gradient(135deg, rgba(201,168,76,0.9), rgba(180,150,60,0.9));
              color: #050507;
              border: none;
              border-radius: 8px;
              padding: 12px 32px;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
              letter-spacing: 0.1em;
              text-transform: uppercase;
            ">Mantener sesión activa</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      // Manejar clic en el botón
      document.getElementById('stay-logged-in').addEventListener('click', function() {
        ultimaActividad = Date.now();
        avisoMostrado = false;
        clearTimeout(temporizadorCierre);
        var modal = document.getElementById('inactivity-modal');
        if (modal) modal.remove();

        // Hacer ping al servidor para renovar sesión
        fetch('/accounts/session-ping/', {
          method: 'POST',
          headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
          },
          credentials: 'same-origin'
        }).catch(function() {});
      });
    }

    // Función para cerrar sesión
    function cerrarSesion() {
      window.location.href = '/accounts/logout/';
    }

    // Actualizar tiempo de última actividad
    function registrarActividad() {
      ultimaActividad = Date.now();

      // Si hay modal visible y el usuario interactúa, cerrarlo
      if (avisoMostrado && document.getElementById('inactivity-modal')) {
        document.getElementById('stay-logged-in').click();
      }
    }

    // Verificar inactividad
    function verificarInactividad() {
      var tiempoInactivo = Date.now() - ultimaActividad;

      if (tiempoInactivo >= TIEMPO_CIERRE) {
        // Cerrar sesión por inactividad
        cerrarSesion();
      } else if (tiempoInactivo >= TIEMPO_AVISO && !avisoMostrado) {
        // Mostrar aviso
        avisoMostrado = true;
        crearModalAviso();

        // Contador regresivo visual
        var segundosRestantes = Math.floor((TIEMPO_CIERRE - tiempoInactivo) / 1000);
        var countdownEl = document.getElementById('countdown');
        if (countdownEl) {
          var intervalo = setInterval(function() {
            segundosRestantes--;
            if (segundosRestantes <= 0) {
              clearInterval(intervalo);
            } else {
              var minutos = Math.floor(segundosRestantes / 60);
              var secs = segundosRestantes % 60;
              countdownEl.textContent = minutos + ':' + String(secs).padStart(2, '0');
            }
          }, 1000);
        }

        // Programar cierre si no hay respuesta
        temporizadorCierre = setTimeout(function() {
          if (avisoMostrado) cerrarSesion();
        }, TIEMPO_CIERRE - tiempoInactivo);
      }
    }

    // Escuchar eventos de actividad
    var eventos = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
    eventos.forEach(function(evento) {
      document.addEventListener(evento, registrarActividad, true);
    });

    // Iniciar verificación periódica
    setInterval(verificarInactividad, INTERVALO_VERIFICACION);
  })();
</script>

</body>
</html>
